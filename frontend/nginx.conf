server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Reason: Block dotfile paths (.env, .git, .aws, .DS_Store, etc.) — scanners
    # probe these constantly. 444 drops the connection without a response, giving
    # scanners no signal that the path was even processed.
    location ~ /\.(env|git|svn|aws|docker|pgpass|netrc|npmrc|htpasswd|htaccess|DS_Store|vite|next|nuxt|svelte) {
        return 444;
    }

    # Server-introspection endpoints (Spring Actuator, Symfony profiler, etc.)
    location ~ ^/(actuator|manage|_profiler|_debug|debug|metrics)(/|$) {
        return 444;
    }

    # WordPress / common CMS probes
    location ~ ^/(wp-includes|wp-admin|wp-content|wp-json|wp-config|xmlrpc\.php|wp-login\.php) {
        return 444;
    }

    # Workflow-tool endpoints (n8n, Camunda) and webhook probes
    location ~ ^/(rest/(workflows|executions|active-workflows|settings)|webhook|form/|form-waiting/) {
        return 444;
    }

    # Common RCE/SSRF probe paths
    location ~ ^/(ueditor|systembc|geoserver|cgi-bin|vendor|phpunit|containers|backup|bin|ecp|SDK|developmentserver)(/|$) {
        return 444;
    }

    # Reason: This stack runs on Node + nginx. No PHP, no Ruby, no Java,
    # no source maps in production, no static config files served. Any
    # request for these extensions is a probe — return 444.
    location ~ \.php$ {
        return 444;
    }
    location ~ \.(sql|log|bak|swp|old|orig|save|tmp)$ {
        return 444;
    }
    location ~ ~$ {
        return 444;
    }
    location ~ \.(yml|yaml|toml|ini|conf|cfg|properties|tfvars|tfstate)$ {
        return 444;
    }
    location ~ \.(zip|rar|7z|tar|gz|tgz|bz2)$ {
        return 444;
    }
    location ~ \.(py|pyc|pyo|rb|pl|sh|bash|ksh|exe|dll|jar|war|class)$ {
        return 444;
    }
    location ~ \.(jsp|jspx|asp|aspx|do|action|cfm|cfc)$ {
        return 444;
    }
    # Source maps must never ship to production. Block any request for them.
    location ~ \.map$ {
        return 444;
    }
    # JSON/XML at any path other than /api — never legitimate for this Vite SPA.
    location ~ ^/(?!api/).*\.(json|xml)$ {
        return 444;
    }

    # Cache hashed Vite build assets
    location ~* ^/assets/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Top-level static files we actually serve
    location = /favicon.ico {
        access_log off;
        try_files $uri =404;
    }
    location = /vite.svg {
        try_files $uri =404;
    }
    location = /robots.txt {
        access_log off;
        try_files $uri =404;
    }

    # Health endpoint (exact match — was prefix before, which let /healthz match)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API proxy to backend
    location /api {
        proxy_pass http://backend:3001/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Reason: SPA fallback — only extensionless paths (client-side React routes
    # like /login, /list/<uuid>, /profile) fall back to index.html. Anything with
    # an extension that wasn't matched above is unknown and gets a 404 instead of
    # the SPA shell. This stops scanners from harvesting 200s by probing for
    # files like /wp-config.txt, /docker-compose.yml, /env.json, etc.
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        if ($uri ~ "\.[^/]+$") {
            return 404;
        }
        rewrite ^.*$ /index.html last;
    }
}
